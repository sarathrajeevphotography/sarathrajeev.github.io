<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recent Weddings — Sarath Rajeev Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F8F6F2;
    --ink: #1C1B18;
    --ink-soft: #4A4843;
    --ink-muted: #8C8A85;
    --gold: #B8965A;
    --gold-light: #D4B483;
    --border: rgba(28,27,24,0.10);
    --border-hover: rgba(28,27,24,0.25);
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Jost', system-ui, sans-serif;
    --transition: 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── PORTFOLIO SECTION ─── */
  .portfolio-section {
    padding: 6rem 0 8rem;
    background: var(--cream);
  }

  .section-header {
    text-align: center;
    margin-bottom: 5rem;
    padding: 0 2rem;
  }

  .section-eyebrow {
    display: block;
    font-family: var(--font-body);
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.25rem;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(2.6rem, 5vw, 4rem);
    font-weight: 300;
    letter-spacing: -0.01em;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 1.25rem;
  }

  .section-title em {
    font-style: italic;
    color: var(--ink-soft);
  }

  .section-rule {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto;
  }

  /* ─── GRID ─── */
  .weddings-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  @media (max-width: 1100px) {
    .weddings-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .weddings-grid { grid-template-columns: 1fr; gap: 0; padding: 0; background: transparent; }
  }

  /* ─── WEDDING CARD ─── */
  .wedding-card {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    background: #1C1B18;
    aspect-ratio: 3/4;
    display: block;
    border: none;
    outline: none;
  }

  @media (max-width: 640px) {
    .wedding-card {
      aspect-ratio: 4/5;
      margin-bottom: 2px;
    }
  }

  .card-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.6s ease;
    filter: brightness(0.75) saturate(0.9);
    background: #2a2925;
  }

  .card-image.loaded { background: transparent; }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(18,17,14,0.88) 0%,
      rgba(18,17,14,0.25) 45%,
      rgba(18,17,14,0.05) 75%,
      transparent 100%
    );
    transition: opacity 0.5s ease;
  }

  .card-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 2rem 1.6rem 1.8rem;
    transform: translateY(0);
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .card-number {
    font-family: var(--font-body);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 0.5rem;
    display: block;
    opacity: 0.8;
  }

  .card-name {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 2.5vw, 1.75rem);
    font-weight: 300;
    color: #F8F6F2;
    line-height: 1.15;
    margin-bottom: 0.3rem;
    letter-spacing: 0.01em;
  }

  .card-location {
    font-family: var(--font-body);
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(248,246,242,0.55);
    margin-bottom: 0;
    transition: color 0.4s ease;
  }

  .card-cta {
    position: absolute;
    bottom: 1.8rem;
    right: 1.6rem;
    width: 36px;
    height: 36px;
    border: 1px solid rgba(248,246,242,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease 0.05s, transform 0.4s ease 0.05s, border-color 0.3s ease;
  }

  .card-cta svg {
    width: 14px;
    height: 14px;
    stroke: rgba(248,246,242,0.8);
    fill: none;
    stroke-width: 1.5;
    transform: rotate(-45deg);
  }

  /* Hover states */
  .wedding-card:hover .card-image {
    transform: scale(1.05);
    filter: brightness(0.65) saturate(0.85);
  }

  .wedding-card:hover .card-location {
    color: var(--gold-light);
  }

  .wedding-card:hover .card-cta {
    opacity: 1;
    transform: translateY(0);
    border-color: rgba(184,150,90,0.6);
  }

  /* Focus */
  .wedding-card:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: -2px;
  }

  /* ─── GALLERY OVERLAY ─── */
  .gallery-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--cream);
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.65s cubic-bezier(0.76, 0, 0.24, 1);
    will-change: transform;
  }

  .gallery-overlay.open {
    transform: translateX(0);
  }

  .gallery-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2.5rem;
  }

  .gallery-back {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: var(--font-body);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0.4rem 0;
    transition: color 0.25s ease;
  }

  .gallery-back:hover { color: var(--ink); }

  .gallery-back svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }

  .gallery-header-title {
    text-align: center;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .gallery-header-name {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  .gallery-header-location {
    font-family: var(--font-body);
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 0.1rem;
    text-align: center;
  }

  .gallery-close {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border-hover);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: none;
    transition: border-color 0.25s ease, background 0.25s ease;
  }

  .gallery-close:hover {
    background: var(--ink);
    border-color: var(--ink);
  }

  .gallery-close:hover svg { stroke: var(--cream); }

  .gallery-close svg {
    width: 16px;
    height: 16px;
    stroke: var(--ink-soft);
    fill: none;
    stroke-width: 1.5;
    transition: stroke 0.25s ease;
  }

  /* ─── GALLERY CONTENT ─── */
  .gallery-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 4rem 2rem 6rem;
  }

  .gallery-hero {
    margin-bottom: 3px;
  }

  .gallery-hero img {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
  }

  .gallery-grid {
    display: grid;
    gap: 3px;
  }

  .gallery-row-2 {
    grid-template-columns: 1fr 1fr;
  }

  .gallery-row-3 {
    grid-template-columns: 2fr 1fr;
  }

  .gallery-row-3-rev {
    grid-template-columns: 1fr 2fr;
  }

  .gallery-row-full {
    grid-template-columns: 1fr;
  }

  .gallery-img-wrap {
    overflow: hidden;
    background: #2a2925;
  }

  .gallery-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .gallery-img-wrap:hover img {
    transform: scale(1.03);
  }

  .gallery-img-wrap.tall { aspect-ratio: 4/5; }
  .gallery-img-wrap.wide { aspect-ratio: 16/9; }
  .gallery-img-wrap.square { aspect-ratio: 1/1; }
  .gallery-img-wrap.portrait { aspect-ratio: 3/4; }

  .gallery-caption {
    text-align: center;
    padding: 4rem 0 2rem;
  }

  .gallery-caption-rule {
    width: 30px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 1.5rem;
  }

  .gallery-caption-text {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-style: italic;
    font-weight: 300;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }

  /* ─── SECTION FOOTER ─── */
  .portfolio-footer {
    text-align: center;
    margin-top: 5rem;
    padding: 0 2rem;
  }

  .footer-line {
    width: 1px;
    height: 60px;
    background: var(--border-hover);
    margin: 0 auto 2rem;
  }

  .footer-text {
    font-family: var(--font-body);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  /* ─── REDUCED MOTION ─── */
  @media (prefers-reduced-motion: reduce) {
    .gallery-overlay,
    .card-image,
    .card-cta,
    .gallery-img-wrap img { transition: none; }
  }

  /* ─── SCROLL REVEAL ─── */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.75s ease, transform 0.75s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .reveal:nth-child(2) { transition-delay: 0.08s; }
  .reveal:nth-child(3) { transition-delay: 0.14s; }
  .reveal:nth-child(4) { transition-delay: 0.20s; }
  .reveal:nth-child(5) { transition-delay: 0.08s; }
  .reveal:nth-child(6) { transition-delay: 0.14s; }
  .reveal:nth-child(7) { transition-delay: 0.20s; }
  .reveal:nth-child(8) { transition-delay: 0.26s; }

  /* Placeholder shimmer for images */
  .img-placeholder {
    background: #2a2925;
    animation: shimmer 1.6s ease infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
</style>
</head>

/* ═══════════════════════════════════════
   BUILD WEDDING CARDS
══════════════════════════════════════════ */
const grid = document.getElementById('weddingsGrid');

weddings.forEach((w, i) => {
  const num = String(i + 1).padStart(3, '0');

  const card = document.createElement('button');
  card.className = 'wedding-card reveal';
  card.setAttribute('role', 'listitem');
  card.setAttribute('aria-label', `View ${w.couple} wedding gallery — ${w.location}`);
  card.dataset.weddingId = w.id;

  card.innerHTML = `
    <img
      class="card-image img-placeholder"
      src="${w.coverUrl}"
      alt="${w.couple} wedding in ${w.location}"
      loading="lazy"
      decoding="async"
    >
    <div class="card-overlay"></div>
    <div class="card-content">
      <span class="card-number">No. ${num}</span>
      <h3 class="card-name">${w.couple}</h3>
      <p class="card-location">${w.location}</p>
    </div>
    <div class="card-cta" aria-hidden="true">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </div>
  `;

  card.querySelector('.card-image').addEventListener('load', function() {
    this.classList.remove('img-placeholder');
    this.classList.add('loaded');
  });

  card.addEventListener('click', () => openGallery(w));
  grid.appendChild(card);
});


/* ═══════════════════════════════════════
   GALLERY OPEN / CLOSE
══════════════════════════════════════════ */
const overlay = document.getElementById('galleryOverlay');
const galleryContent = document.getElementById('galleryContent');
const galleryHeaderName = document.getElementById('galleryHeaderName');
const galleryHeaderLocation = document.getElementById('galleryHeaderLocation');
let scrollPos = 0;

function openGallery(wedding) {
  scrollPos = window.scrollY;

  galleryHeaderName.textContent = wedding.couple;
  galleryHeaderLocation.textContent = wedding.location;

  buildGallery(wedding);

  document.body.style.overflow = 'hidden';
  document.body.style.position = 'fixed';
  document.body.style.top = `-${scrollPos}px`;
  document.body.style.width = '100%';

  overlay.removeAttribute('inert');
  overlay.classList.add('open');
  overlay.scrollTop = 0;

  document.getElementById('galleryClose').focus();
}

function closeGallery() {
  overlay.classList.remove('open');
  overlay.setAttribute('inert', '');

  document.body.style.overflow = '';
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.width = '';
  window.scrollTo(0, scrollPos);
}

document.getElementById('galleryClose').addEventListener('click', closeGallery);
document.getElementById('galleryBack').addEventListener('click', closeGallery);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && overlay.classList.contains('open')) closeGallery();
});


/* ═══════════════════════════════════════
   BUILD GALLERY LAYOUT
   Storytelling editorial layout: hero → pair → asymmetric → solo → pair → portrait pair
══════════════════════════════════════════ */
function buildGallery(wedding) {
  const imgs = wedding.images;

  galleryContent.innerHTML = `
    <!-- Hero: Image 1 -->
    <div class="gallery-hero gallery-img-wrap wide">
      <img src="${imgs[0].url}" alt="${wedding.couple} wedding photograph 1" loading="lazy" decoding="async">
    </div>

    <!-- Row: 2 col equal — img 2 & 3 -->
    <div class="gallery-grid gallery-row-2" style="margin-top:3px">
      <div class="gallery-img-wrap tall">
        <img src="${imgs[1].url}" alt="${wedding.couple} wedding photograph 2" loading="lazy" decoding="async">
      </div>
      <div class="gallery-img-wrap tall">
        <img src="${imgs[2].url}" alt="${wedding.couple} wedding photograph 3" loading="lazy" decoding="async">
      </div>
    </div>

    <!-- Full width — img 4 -->
    <div class="gallery-grid gallery-row-full" style="margin-top:3px">
      <div class="gallery-img-wrap wide">
        <img src="${imgs[3].url}" alt="${wedding.couple} wedding photograph 4" loading="lazy" decoding="async">
      </div>
    </div>

    <!-- Asymmetric 1:2 — img 5 & 6 -->
    <div class="gallery-grid gallery-row-3-rev" style="margin-top:3px">
      <div class="gallery-img-wrap portrait">
        <img src="${imgs[4].url}" alt="${wedding.couple} wedding photograph 5" loading="lazy" decoding="async">
      </div>
      <div class="gallery-img-wrap portrait">
        <img src="${imgs[5].url}" alt="${wedding.couple} wedding photograph 6" loading="lazy" decoding="async">
      </div>
    </div>

    <!-- Full width — img 7 -->
    <div class="gallery-grid gallery-row-full" style="margin-top:3px">
      <div class="gallery-img-wrap wide">
        <img src="${imgs[6].url}" alt="${wedding.couple} wedding photograph 7" loading="lazy" decoding="async">
      </div>
    </div>

    <!-- Asymmetric 2:1 — img 8 & 9 -->
    <div class="gallery-grid gallery-row-3" style="margin-top:3px">
      <div class="gallery-img-wrap tall">
        <img src="${imgs[7].url}" alt="${wedding.couple} wedding photograph 8" loading="lazy" decoding="async">
      </div>
      <div class="gallery-img-wrap tall">
        <img src="${imgs[8].url}" alt="${wedding.couple} wedding photograph 9" loading="lazy" decoding="async">
      </div>
    </div>

    <!-- Full width — img 10 -->
    <div class="gallery-grid gallery-row-full" style="margin-top:3px">
      <div class="gallery-img-wrap wide">
        <img src="${imgs[9].url}" alt="${wedding.couple} wedding photograph 10" loading="lazy" decoding="async">
      </div>
    </div>

    <!-- Caption -->
    <div class="gallery-caption">
      <div class="gallery-caption-rule" role="presentation"></div>
      <p class="gallery-caption-text">${wedding.quote}</p>
    </div>
  `;
}


/* ═══════════════════════════════════════
   SCROLL REVEAL (Intersection Observer)
══════════════════════════════════════════ */
const revealEls = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(
  (entries) => entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } }),
  { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
);
revealEls.forEach(el => observer.observe(el));
</script>
